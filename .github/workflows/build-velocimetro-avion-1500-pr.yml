name: Build Velocimetro Avion 1500 APK PR

on:
  pull_request:
    branches:
      - main
    paths:
      - '.build/pr-air-1500-trigger.txt'
      - '.github/workflows/build-velocimetro-avion-1500-pr.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore previous Android project
        run: |
          rm -rf generated dist
          mkdir -p generated dist
          git show 94b29b072ad6f1fd332c410e5f7fbd4f4cec3eaa:.build/velocimetro-altimetro-offline.zip.b64 | base64 -d > generated/project.zip
          unzip -q generated/project.zip -d generated

      - name: Patch to airplane 1500 mode and saved parameters
        run: |
          python3 <<'PY'
          from pathlib import Path
          root=Path('generated/velocimetro-altimetro-offline')
          main=root/'app/src/main/java/com/carles/velocimetrooffline/MainActivity.java'
          gauge=root/'app/src/main/java/com/carles/velocimetrooffline/SpeedGaugeView.java'
          text=main.read_text()
          text=text.replace('private static final String KEY_SEA_LEVEL = "sea_level_pressure";', '''private static final String KEY_SEA_LEVEL = "sea_level_pressure";\n    private static final String KEY_ACCELERATION_BIAS = "acceleration_bias";\n    private static final String KEY_SPEED_SCALE = "speed_scale_kmh";\n    private static final float SPEED_SCALE_KMH = 1500f;\n    private static final double MAX_SPEED_MS = SPEED_SCALE_KMH / 3.6;''')
          text=text.replace('private TextView sensorStatus;\n    private Button startButton;', 'private TextView sensorStatus;\n    private TextView parametersStatus;\n    private Button startButton;')
          text=text.replace('seaLevelPressure = prefs.getFloat(KEY_SEA_LEVEL, SensorManager.PRESSURE_STANDARD_ATMOSPHERE);', 'seaLevelPressure = prefs.getFloat(KEY_SEA_LEVEL, SensorManager.PRESSURE_STANDARD_ATMOSPHERE);\n        accelerationBias = prefs.getFloat(KEY_ACCELERATION_BIAS, 0f);\n        prefs.edit().putFloat(KEY_SPEED_SCALE, SPEED_SCALE_KMH).apply();')
          text=text.replace('TextView subtitle = text("100 % sin Internet, Wi-Fi ni GPS", 14,\n                Color.rgb(145, 166, 184), Typeface.NORMAL);', 'TextView subtitle = text("Modo avión · escala 0–1500 km/h · sin Internet, Wi‑Fi ni GPS", 14,\n                Color.rgb(145, 166, 184), Typeface.NORMAL);')
          text=text.replace('altitudeCard.addView(calibrateAltitude, matchWrap(0));\n        root.addView(altitudeCard, matchWrap(dp(14)));', '''altitudeCard.addView(calibrateAltitude, matchWrap(dp(10)));\n\n        Button saveParameters = button("GUARDAR PARÁMETROS", Color.rgb(49, 215, 196), Color.rgb(7, 17, 31));\n        saveParameters.setOnClickListener(v -> saveParametersNow(true));\n        altitudeCard.addView(saveParameters, matchWrap(0));\n\n        parametersStatus = text("", 13, Color.rgb(145, 166, 184), Typeface.NORMAL);\n        parametersStatus.setPadding(dp(4), dp(8), dp(4), dp(4));\n        altitudeCard.addView(parametersStatus, matchWrap(0));\n        root.addView(altitudeCard, matchWrap(dp(14)));''')
          text=text.replace('"Importante: sin GPS ni conexión al vehículo, la velocidad se calcula integrando el acelerómetro y puede desviarse. Coloca el móvil bien sujeto, plano y con la parte superior mirando hacia delante. Pulsa PONER A CERO con el vehículo detenido.",', '"Importante: sin GPS ni conexión al avión, la app no puede conocer la velocidad real de crucero. Sin GPS ni conexión al vehículo, la velocidad se calcula integrando el acelerómetro y sirve como estimación de cambios de velocidad. La escala está preparada hasta 1500 km/h. Pulsa PONER A CERO con el móvil quieto.",')
          text=text.replace('updateSensorStatus();', 'updateSensorStatus();\n        updateParametersStatus();')
          text=text.replace('"Barómetro: NO disponible; no se podrá calcular la altitud";\n        sensorStatus.setText(acceleration + "\\n" + pressure + "\\nSin permisos de red ni ubicación.");', '"Barómetro: NO disponible; no se podrá calcular la altitud";\n        sensorStatus.setText(acceleration + "\\n" + pressure + "\\nEscala velocidad: 0–1500 km/h. Sin permisos de red ni ubicación.");')
          text=text.replace('Toast.makeText(this, "Cero calibrado", Toast.LENGTH_SHORT).show();', 'saveParametersNow(false);\n                updateParametersStatus();\n                Toast.makeText(this, "Cero calibrado y guardado", Toast.LENGTH_SHORT).show();')
          text=text.replace('if (speedMs > 66.67) speedMs = 66.67;', 'if (speedMs > MAX_SPEED_MS) speedMs = MAX_SPEED_MS;')
          text=text.replace('.putFloat(KEY_SEA_LEVEL, seaLevelPressure)\n                                .apply();', '.putFloat(KEY_SEA_LEVEL, seaLevelPressure)\n                                .putFloat(KEY_SPEED_SCALE, SPEED_SCALE_KMH)\n                                .apply();')
          text=text.replace('Toast.makeText(this, "Altímetro calibrado", Toast.LENGTH_SHORT).show();', 'updateParametersStatus();\n                        Toast.makeText(this, "Altímetro calibrado y guardado", Toast.LENGTH_SHORT).show();')
          text=text.replace('.putFloat(KEY_SEA_LEVEL, seaLevelPressure)\n                            .apply();', '.putFloat(KEY_SEA_LEVEL, seaLevelPressure)\n                            .putFloat(KEY_SPEED_SCALE, SPEED_SCALE_KMH)\n                            .apply();')
          text=text.replace('seaLevelPressure = SensorManager.PRESSURE_STANDARD_ATMOSPHERE;\n                    getSharedPreferences(PREFS, MODE_PRIVATE)', 'seaLevelPressure = SensorManager.PRESSURE_STANDARD_ATMOSPHERE;\n                    updateParametersStatus();\n                    getSharedPreferences(PREFS, MODE_PRIVATE)')
          insert='''\n    private void saveParametersNow(boolean showToast) {\n        getSharedPreferences(PREFS, MODE_PRIVATE)\n                .edit()\n                .putFloat(KEY_SEA_LEVEL, seaLevelPressure)\n                .putFloat(KEY_ACCELERATION_BIAS, (float) accelerationBias)\n                .putFloat(KEY_SPEED_SCALE, SPEED_SCALE_KMH)\n                .apply();\n        updateParametersStatus();\n        if (showToast) {\n            Toast.makeText(this, "Parámetros guardados en este móvil", Toast.LENGTH_SHORT).show();\n        }\n    }\n\n    private void updateParametersStatus() {\n        if (parametersStatus == null) return;\n        parametersStatus.setText(String.format(Locale.getDefault(),\n                "Parámetros guardados: escala %.0f km/h · presión ref. %.1f hPa · sesgo acel. %.3f m/s²",\n                SPEED_SCALE_KMH, seaLevelPressure, accelerationBias));\n    }\n\n'''
          text=text.replace('    @Override\n    public void onAccuracyChanged', insert+'    @Override\n    public void onAccuracyChanged')
          main.write_text(text)
          g=gauge.read_text()
          g=g.replace('private float maxSpeedKmh = 0f;\n    private boolean measuring = false;', 'private static final float SCALE_MAX_KMH = 1500f;\n    private float maxSpeedKmh = 0f;\n    private boolean measuring = false;')
          g=g.replace('this.speedKmh = Math.max(0f, Math.min(240f, speedKmh));', 'this.speedKmh = Math.max(0f, Math.min(SCALE_MAX_KMH, speedKmh));')
          g=g.replace('float sweep = (speedKmh / 240f) * 270f;', 'float sweep = (speedKmh / SCALE_MAX_KMH) * 270f;')
          g=g.replace('for (int value = 0; value <= 240; value += 20) {\n            float angle = (float) Math.toRadians(135f + (value / 240f) * 270f);', 'for (int value = 0; value <= 1500; value += 250) {\n            float angle = (float) Math.toRadians(135f + (value / SCALE_MAX_KMH) * 270f);')
          g=g.replace('float needleAngle = (float) Math.toRadians(135f + (speedKmh / 240f) * 270f);', 'float needleAngle = (float) Math.toRadians(135f + (speedKmh / SCALE_MAX_KMH) * 270f);')
          g=g.replace('canvas.drawText("km/h · ESTIMACIÓN", cx, cy + radius * 0.66f, paint);', 'canvas.drawText("km/h · ESCALA AVIÓN", cx, cy + radius * 0.66f, paint);')
          g=g.replace('canvas.drawText(String.format(Locale.getDefault(), "Máxima %.0f km/h", maxSpeedKmh), cx, cy + radius * 0.84f, paint);', 'canvas.drawText(String.format(Locale.getDefault(), "Máxima %.0f km/h · escala 1500", maxSpeedKmh), cx, cy + radius * 0.84f, paint);')
          gauge.write_text(g)
          PY

      - name: Build APK
        run: |
          cd generated/velocimetro-altimetro-offline
          gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Prepare APK
        run: cp generated/velocimetro-altimetro-offline/app/build/outputs/apk/debug/app-debug.apk dist/Velocimetro_Altimetro_Carles_Avion_1500.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Velocimetro-Altimetro-Carles-Avion-1500
          path: dist/Velocimetro_Altimetro_Carles_Avion_1500.apk
          if-no-files-found: error
