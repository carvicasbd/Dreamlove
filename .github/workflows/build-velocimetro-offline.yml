name: Build Velocimetro Offline APK

on:
  push:
    branches:
      - main
      - build/velocimetro-altimetro-offline
    paths:
      - '.build/velocimetro-altimetro-offline.zip.b64'
      - '.github/workflows/build-velocimetro-offline.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore Android project
        run: |
          rm -rf generated dist
          mkdir -p generated dist
          base64 -d .build/velocimetro-altimetro-offline.zip.b64 > generated/velocimetro.zip
          unzip -q generated/velocimetro.zip -d generated

      - name: Build installable APK
        run: |
          cd generated/velocimetro-altimetro-offline
          gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Prepare APK
        run: |
          cp generated/velocimetro-altimetro-offline/app/build/outputs/apk/debug/app-debug.apk dist/Velocimetro_Altimetro_Carles_Offline.apk
          base64 -w0 dist/Velocimetro_Altimetro_Carles_Offline.apk > dist/Velocimetro_Altimetro_Carles_Offline.apk.b64

      - name: Publish compiled APK payload
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/Velocimetro_Altimetro_Carles_Offline.apk.b64
          git commit -m "Publish compiled offline speedometer APK" || exit 0
          git push

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Velocimetro-Altimetro-Carles-Offline
          path: dist/Velocimetro_Altimetro_Carles_Offline.apk
          if-no-files-found: error
