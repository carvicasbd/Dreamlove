name: Build Velocimetro Offline APK

on:
  push:
    branches:
      - build/velocimetro-altimetro-offline
    paths:
      - '.build/velocimetro-altimetro-offline.zip.b64'
      - '.github/workflows/build-velocimetro-offline.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore Android project
        run: |
          mkdir -p /tmp/velocimetro-src dist
          base64 -d .build/velocimetro-altimetro-offline.zip.b64 > /tmp/velocimetro.zip
          unzip -q /tmp/velocimetro.zip -d /tmp/velocimetro-src

      - name: Build installable APK
        working-directory: /tmp/velocimetro-src/velocimetro-altimetro-offline
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Prepare APK
        run: cp /tmp/velocimetro-src/velocimetro-altimetro-offline/app/build/outputs/apk/debug/app-debug.apk dist/Velocimetro_Altimetro_Carles_Offline.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Velocimetro-Altimetro-Carles-Offline
          path: dist/Velocimetro_Altimetro_Carles_Offline.apk
          if-no-files-found: error
