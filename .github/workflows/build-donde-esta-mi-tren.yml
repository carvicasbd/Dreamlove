name: Build Android APK
on:
  push:
    branches: [build-donde-esta-mi-tren]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: cd android-compact && gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: DondeEstaMiTren-apk
          path: android-compact/app/build/outputs/apk/debug/app-debug.apk
