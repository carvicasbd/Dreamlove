plugins {
    id 'com.android.application'
}

android {
    namespace 'com.carles.sabadelltransport'
    compileSdk 35

    defaultConfig {
        applicationId 'com.carles.sabadelltransport'
        minSdk 23
        targetSdk 35
        versionCode 3
        versionName '3.0.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
